name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-backend:
    name: Deploy backend (monolith or web tier)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Required Secrets
        run: |
          if [ -z "${{ secrets.SERVER_HOST }}" ]; then
            echo "❌ SERVER_HOST secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.SERVER_USER }}" ]; then
            echo "❌ SERVER_USER secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.SERVER_SSH_KEY }}" ]; then
            echo "❌ SERVER_SSH_KEY secret is not set"
            exit 1
          fi
          echo "✅ Web server SSH secrets are set"

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 20m
          script: |
            set -e
            cd /opt/ai-grader/AGT_platform || { echo "❌ Missing /opt/ai-grader/AGT_platform"; exit 1; }
            git pull origin main
            STACK='${{ secrets.DEPLOY_STACK }}'
            if [ -z "$STACK" ]; then STACK=monolith; fi
            echo "📦 Deploy stack: $STACK"

            if [ "$STACK" = "split" ]; then
              echo "🐳 Web tier (docker-compose.web.prod.yaml)…"
              docker compose -f docker-compose.web.prod.yaml --env-file .env.production pull
              docker compose -f docker-compose.web.prod.yaml --env-file .env.production up -d --build
              echo "⏳ Waiting for services…"
              sleep 10
              echo "📊 Database migrations…"
              docker exec ai_grader_backend_prod alembic upgrade head || true
              docker compose -f docker-compose.web.prod.yaml restart backend
            else
              echo "🐳 Monolith (docker-compose.prod.yaml)…"
              docker compose -f docker-compose.prod.yaml --env-file .env.production pull
              docker compose -f docker-compose.prod.yaml --env-file .env.production up -d --build
              sleep 10
              echo "🤖 Ollama model pull…"
              docker exec ai_grader_ollama_prod ollama pull llama3.2:3b || true
              echo "📊 Database migrations…"
              docker exec ai_grader_backend_prod alembic upgrade head || true
              docker compose -f docker-compose.prod.yaml restart backend worker
            fi
            echo "✅ Backend deploy complete"

  deploy-gpu:
    name: Deploy GPU inference tier
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' &&
      secrets.DEPLOY_STACK == 'split' &&
      secrets.GPU_SERVER_HOST

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy GPU stack
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.GPU_SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 25m
          script: |
            set -e
            cd /opt/ai-grader/AGT_platform || { echo "❌ Missing /opt/ai-grader/AGT_platform"; exit 1; }
            git pull origin main
            echo "🐳 GPU tier (docker-compose.gpu.prod.yaml)…"
            docker compose -f docker-compose.gpu.prod.yaml --env-file .env.production.gpu pull
            docker compose -f docker-compose.gpu.prod.yaml --env-file .env.production.gpu up -d --build
            sleep 8
            echo "🤖 Ollama model pull…"
            docker exec ai_grader_ollama_prod ollama pull llama3.2:3b || true
            docker compose -f docker-compose.gpu.prod.yaml restart worker
            echo "✅ GPU deploy complete"

  deploy-frontend:
    name: Deploy Frontend to Cloudflare Pages
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Cloudflare Secrets
        id: check-secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "secrets_available=false" >> $GITHUB_OUTPUT
          elif [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "secrets_available=false" >> $GITHUB_OUTPUT
          else
            echo "secrets_available=true" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Cloudflare Pages
        if: steps.check-secrets.outputs.secrets_available == 'true'
        uses: cloudflare/pages-action@v1
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ai-grader-frontend
          directory: AGT_platform/frontend
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: '3'

      - name: Skip Frontend Deployment (if secrets missing)
        if: steps.check-secrets.outputs.secrets_available != 'true'
        run: echo "⏭️ Skipping Cloudflare Pages (secrets not set). Set VITE_API_BASE in Pages to https://api.dia-ai-grader.com when using split + ALB."
